# Player{NUMBER} becomes Player1 if you are the first slot.
name: Player{NUMBER}
game: Star Fox 64
Star Fox 64:

  # When you die, everyone who enabled death link dies. Of course, the reverse is true too.
  deathlink: false

  # Require a certain number of medals before you can enter Venom 2.
  # The same requirment will apply for Venom 1 if your victory condition is 'andross_or_robot_andross'
  required_medals: 0

  # Shuffle the medals awarded by reaching a certain number of Hits in each level.
  # Earning a medal will give a random item, and you will visually see the medal on the map to indicate that you've completed the check.
  shuffle_medals: false

  # Shuffle the paths between levels.
  # Completing a level a certain way will give a random item. You cannot take the path that normally unlocks until you receive that path item.
  # For example: Getting 'Mission Complete' on Corneria will give a random item. However, you cannot go to Meteo until you receive 'Corneria - Blue Path'
  shuffle_paths: true

  # Choose your victory condition.
  # andross_or_robot_andross - Defeat either Andross or Robot Andross
  # andross_and_robot_andross - Defeat both Andross and Robot Andross
  # andross - Defeat Andross in Venom 2
  victory_condition: andross_or_robot_andross

  # Getting 'Mission Accomplished' on any level will also count as getting 'Mission Complete' for that level.
  accomplished_sends_complete: false

  # Randomize the radio dialog.
  radio_rando: true

  # Set the number of lives (Arwings) you start with and reset to after a game over.
  default_lives: 2

  # Set the score required to earn the medal on each level.
  medal_corneria: 150
  medal_meteo: 200
  medal_sector_y: 150
  medal_katina: 150
  medal_fortuna: 50
  medal_aquas: 150
  medal_solar: 100
  medal_sector_x: 150
  medal_zoness: 250
  medal_titania: 150
  medal_sector_z: 100
  medal_macbeth: 150
  medal_area_6: 300
  medal_bolse: 150
  medal_venom: 200
